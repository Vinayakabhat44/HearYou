server:
  port: 8080

spring:
  application:
    name: mitra-gateway-service
  cloud:
    gateway:
      routes:
        - id: mitra-auth-service
          uri: lb://MITRA-AUTH-SERVICE
          predicates:
            - Path=/api/auth/**, /api/users/**
        - id: mitra-core-service
          uri: lb://MITRA-CORE-SERVICE
          predicates:
            - Path=/api/stories/**, /api/feeds/**, /api/feed/**, /api/media/**, /api/news/**, /api/social/**, /api/core/**

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_SERVER:http://localhost:8761/eureka/}

logging:
  level:
    org.springframework.cloud.gateway: TRACE
    org.springframework.http.server.reactive: DEBUG
    org.springframework.web.reactive: DEBUG
    reactor.netty: DEBUG

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: always
  info:
    env:
      enabled: true

info:
  app:
    name: ${spring.application.name}
    description: API Gateway for MitraAI
    version: 0.0.1

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    urls:
      - name: Auth Service
        url: /api/auth/v3/api-docs
      - name: Core Service
        url: /api/core/v3/api-docs
